<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style/landingPage.css">
    <title>Login Page</title>
</head>
<body class="light-theme transition-theme">
    <div class="LandingPage">
        <form class="inputForm" action="login.php" method="post">
            <h1>Welcome Back</h1>
            <p>Enter your details to access your account</p>
            <label>Username</label><br>
            <input type="text" placeholder="Username" id="username" name="userName" required><br>
            <label>Password</label><br>
            <input type="password" placeholder="Password" id="password" name="password" required><br>
            <button type="submit" name="login_btn">Login</button><br>
            <label>Don't have an account, <a href="signup.html">Create account</a></label>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
