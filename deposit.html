<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit</title>
    <link rel="stylesheet" href="Style/layout.css">
</head>
<body>
    <header class="box" id="header">
        <h1>Banking System</h1>
        <div id="profileArea">
            <img src="assets/icons8-test-account-50.png" alt="profile icon" id="profileICON">
        </div>
    </header>
    <div>
        <aside class="box" id="sidebar">
            <h2>Menu</h2>
            <nav>
                <a href="index.html">Home</a>
                <a href="dashboard.html">Dashboard</a>
                <a href="deposit.html">Deposit</a>
                <a href="withdraw.html">Withdraw</a>
                <a href="transfer.html">Transfer</a>
                <a href="transactions.html">Transactions</a>
            </nav>
        </aside>
        <main class="box" id="main">
            <header><h3>Deposit</h3></header>
            <hr><br>
            <div id="depositForm">
                <p>Current Balance: <span id="currentBalance"></span></p>
                <br>
                <label>Amount to Deposit</label><br><br>
                <input type="number" id="depositAmount" name="amount" placeholder="Enter amount" min="1"><br><br>
                <button onclick="submitDeposit()">Deposit</button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
