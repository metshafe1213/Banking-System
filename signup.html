<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style/landingPage.css">
    <title>Sign-Up Page</title>
</head>
<body>
    <div class="LandingPage">
        <form class="inputForm" action="signup.php" method="POST">
            <h1>Welcome</h1>
            <p>Enter the following details to register</p>
            <label>Full Name</label><br>
            <input type="text" placeholder="Full name" name="fullName" required><br>
            <label>Username</label><br>
            <input type="text" placeholder="Username" name="userName" required><br>
            <label>Password</label><br>
            <input type="password" placeholder="Password" name="password" required><br>
            <label>Confirm Password</label><br>
            <input type="password" placeholder="Confirm Password" name="confirmPassword" required><br>
            <button type="submit" name="signup_btn">Sign-Up</button><br>
            <label>Already have an account, <a href="login.html">Login</a></label>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
